# Render Blueprint — Backend only (Frontend on Vercel)

services:
  - type: web
    name: ai-tools-directory-api
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev
    startCommand: npx prisma db push --skip-generate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3001
